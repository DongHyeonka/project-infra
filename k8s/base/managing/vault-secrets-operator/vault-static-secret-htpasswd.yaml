apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: docker-registry-htpasswd
  namespace: mnt
spec:
  vaultAuthRef: mnt/vault-auth
  mount: secret
  type: kv-v2
  path: docker-registry/auth
  refreshAfter: 1h
  destination:
    name: docker-registry-htpasswd
    create: true

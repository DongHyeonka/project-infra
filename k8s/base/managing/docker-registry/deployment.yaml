apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-registry
  namespace: mnt
  labels:
    app: docker-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-registry
  template:
    metadata:
      labels:
        app: docker-registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
            - name: auth
              mountPath: /auth
              readOnly: true
          envFrom:
            - configMapRef:
                name: docker-registry-config
      volumes:
        - name: registry-data
          persistentVolumeClaim:
            claimName: docker-registry-pvc
        - name: auth
          secret:
            secretName: docker-registry-htpasswd
